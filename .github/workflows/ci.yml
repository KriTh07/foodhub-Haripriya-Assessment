name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit & Integration Tests ─────────────────────────────────────────────────
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --coverage

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Upload Allure results (Jest)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-jest
          path: allure-results/jest/

  # ── Contract Tests ───────────────────────────────────────────────────────────
  contract:
    name: Contract Tests (Pact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run consumer contract tests
        run: npm run test:contract

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pact-files
          path: pacts/

      - name: Upload Allure results (contract)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-contract
          path: allure-results/jest/

  # ── API Tests ────────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: unit-and-integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Start server
        run: npm run start &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run API tests
        run: npm run test:api
        env:
          API_BASE_URL: http://localhost:3000
          NODE_ENV: test

      - name: Run provider pact verification
        run: npm run test:pact:provider
        env:
          API_BASE_URL: http://localhost:3000
          NODE_ENV: test

  # ── Lint & Type Check ────────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint || echo "Lint warnings (non-blocking)"

  # ── E2E Tests ────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [unit-and-integration, build]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, mobile-chrome]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser == 'mobile-chrome' && 'chromium' || matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DEFAULT_BROWSER: ${{ matrix.browser }}
          TEST_TIMEOUT: 30000
          TEST_RETRIES: 2
          TEST_WORKERS: 1
          HEADLESS: true
          ENABLE_SCREENSHOTS: true
          ENABLE_VIDEO: true
          ENABLE_TRACING: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_NAME: ${{ secrets.TEST_USER_NAME }}
          VALID_CARD: ${{ secrets.VALID_CARD }}
          DECLINED_CARD: ${{ secrets.DECLINED_CARD }}
          INSUFFICIENT_FUNDS_CARD: ${{ secrets.INSUFFICIENT_FUNDS_CARD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

      - name: Upload Allure results (E2E)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e-${{ matrix.browser }}
          path: allure-results/e2e/
          retention-days: 14

  # ── Allure Report ────────────────────────────────────────────────────────────
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [unit-and-integration, contract, e2e]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined/
          merge-multiple: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-combined
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [unit-and-integration, quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
